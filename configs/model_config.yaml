experiment_name: "wids-wildfire-2026"
random_seed: 42

validation:
  strategy: "kfold"  # Options: kfold, temporal
  n_splits: 5
  shuffle: true

models:
  logistic_regression:
    C: 1.0
    max_iter: 1000

  random_forest:
    n_estimators: 100
    max_depth: null
    min_samples_split: 2

  xgboost:
    n_estimators: 500
    max_depth: 6
    learning_rate: 0.1
    subsample: 0.8
    colsample_bytree: 0.8
    objective: "survival:aft"  # TBD based on task framing

  lightgbm:
    n_estimators: 500
    max_depth: -1
    learning_rate: 0.1
    subsample: 0.8
    colsample_bytree: 0.8

  cox_ph:
    penalizer: 0.01
    l1_ratio: 0.0

  random_survival_forest:
    n_estimators: 100
    max_depth: null

ensemble:
  method: "weighted_average"  # Options: weighted_average, stacking, blending
  weights: []  # Optimized on validation set
